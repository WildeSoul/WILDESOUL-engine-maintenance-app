name: Engine Maintenance MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r deployment/requirements.txt
        pip install jupyter nbconvert huggingface_hub mlflow matplotlib seaborn

    - name: Run Jupyter Notebook
      run: |
        # Execute the notebook to ensure no errors
        jupyter nbconvert --to notebook --execute predictive_maintenance.ipynb

    - name: Deploy to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Using huggingface-cli to push the deployment app
        pip install huggingface_hub
        huggingface-cli login --token $HF_TOKEN --add-to-git-credential
        # Setup git configuration
        git config --global user.email "github-actions@github.com"
        git config --global user.name "GitHub Actions"
        
        # Clone space, copy deployment files, push
        git clone https://huggingface.co/spaces/YOUR_HF_USERNAME/engine-maintenance-app hf_space
        cp deployment/* hf_space/
        cp model_building/best_model.joblib hf_space/
        cd hf_space
        git add .
        git commit -m "Automated deployment from GitHub Actions" || echo "No changes to commit"
        git push origin main
